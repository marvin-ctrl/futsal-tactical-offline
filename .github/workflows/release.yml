name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  macos-bundle:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Verify release baseline
        run: npm run release:verify

      - name: Build macOS bundle
        run: npm run tauri:build

      - name: Archive .app bundle
        run: |
          cd src-tauri/target/release/bundle/macos
          tar -czf "Futsal Tactical Offline.app.tar.gz" "Futsal Tactical Offline.app"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /Users/runner/work/futsal-tactical-offline/futsal-tactical-offline/src-tauri/target/release/bundle/dmg/Futsal Tactical Offline_*.dmg
            /Users/runner/work/futsal-tactical-offline/futsal-tactical-offline/src-tauri/target/release/bundle/macos/Futsal Tactical Offline.app.tar.gz
          generate_release_notes: true
